<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angle Rack Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="script.js" defer></script>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="icon.png" alt="Logo" onerror="this.style.display='none'">
        <h1>Angle Slotted Rack</h1>
    </div>

    <div class="glass-card">
        <div class="input-grid">
            <div><label>Height (ft)</label><input type="number" id="aH" placeholder="0" oninput="calc()"></div>
            <div><label>Angle Qty</label><input type="number" id="aQ" placeholder="0" oninput="calc()"></div>
        </div>

        <label>Angle Thickness</label>
        <select id="aGauge" onchange="calc()" style="margin-bottom:12px">
            <option value="14">14 Gauge (0.35 kg/ft)</option>
            <option value="16">16 Gauge (0.26 kg/ft)</option>
            <option value="18">18 Gauge (0.21 kg/ft)</option>
        </select>

        <div class="input-grid">
            <div>
                <label>Shelf Size</label>
                <select id="sSize" onchange="calc()">
                    <option value="3x12">3' x 12"</option><option value="3x15">3' x 15"</option>
                    <option value="3x18">3' x 18"</option><option value="3x23">3' x 23"</option>
                    <option value="4x12">4' x 12"</option><option value="4x15">4' x 15"</option>
                    <option value="4x18">4' x 18"</option><option value="4x23">4' x 23"</option>
                </select>
            </div>
            <div><label>Shelf Qty</label><input type="number" id="sQ" placeholder="0" oninput="calc()"></div>
        </div>

        <label>Shelf Gauge</label>
        <select id="sGauge" onchange="calc()" style="margin-bottom:12px">
            <option value="24">24 Gauge (0.6mm)</option>
            <option value="22">22 Gauge (0.8mm)</option>
            <option value="20" selected>20 Gauge (1.0mm)</option>
            <option value="18">18 Gauge (1.25mm)</option>
        </select>

        <label>Rate / KG (₹)</label>
        <input type="number" id="rate" placeholder="0" oninput="calc()">

        <div class="dashboard">
            <div class="res-line"><span>Weight:</span> <span class="val" id="w_total">0.00 kg</span></div>
            <div class="res-line"><span>Nut & Bolts:</span> <span class="val" id="nb_total">0 pcs</span></div>
            <div class="res-line"><span>Amt (No GST):</span> <span class="val" id="price_base">₹0</span></div>
            <div class="res-line"><span>GST (18%):</span> <span class="val" id="gst_amt" style="color:#fbbf24">₹0</span></div>
            
            <div class="price-row">
                <label style="color:rgba(255,255,255,0.6)"> Total</label>
                <span class="grand-total" id="price_grand">₹0</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearAll()">Clear</button>
            <button class="btn btn-save" onclick="saveHistory()">Save Quote</button>
        </div>
    </div>

    <div id="history-section" style="margin-top:25px; width:100%;">
        <h3 id="histHeader" style="display:none; font-size: 0.8rem; color: #64748b; margin-bottom:10px; text-transform: uppercase;">Recent Quotes</h3>
        <div id="historyList"></div>
        <button id="clearHistBtn" onclick="clearHistory()" style="display:none; background:none; border:1px solid #ef4444; color:#ef4444; padding:8px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px; font-size:0.75rem;">Clear History</button>
    </div>
</div>

</body>
</html>
