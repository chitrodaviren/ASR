<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angle Rack Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #10b981; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 15px; }
        .header img { width: 75px; height: 75px; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; color: var(--dark); margin: 10px 0; font-weight: 800; }
        .glass-card { background: white; padding: 22px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; background: #f8fafc; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); background: white; }
        .dashboard { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); color: white; padding: 22px; border-radius: 22px; margin-top: 20px; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .val { font-weight: 700; color: #a7f3d0; }
        .price-row { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px; padding-top: 10px; }
        .grand-total { font-size: 1.8rem; font-weight: 900; color: #34d399; text-align: right; display: block; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-clear { background: #fee2e2; color: #ef4444; }
        .btn-save { background: var(--primary); color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><img src="manifesticon.png" alt="MDR"><h1>Angle Slotted Rack</h1></div>
    <div class="glass-card">
        <div class="input-grid">
            <div><label>Height (ft)</label><input type="number" id="aH" placeholder="0" oninput="calc()"></div>
            <div><label>Angle Qty</label><input type="number" id="aQ" placeholder="0" oninput="calc()"></div>
        </div>
        <label>Angle Thickness</label>
        <select id="aGauge" onchange="calc()" style="margin-bottom:12px">
            <option value="0.35">14 Gauge (0.35 kg/ft)</option>
            <option value="0.26">16 Gauge (0.26 kg/ft)</option>
            <option value="0.21">18 Gauge (0.21 kg/ft)</option>
        </select>
        <div class="input-grid">
            <div><label>Shelf Size</label>
                <select id="sSize" onchange="calc()">
                    <option value="3x12">3'x12"</option><option value="3x15">3'x15"</option>
                    <option value="3x18">3'x18"</option><option value="3x23">3'x23"</option>
                    <option value="4x12">4'x12"</option><option value="4x15">4'x15"</option>
                    <option value="4x18">4'x18"</option><option value="4x23">4'x23"</option>
                </select>
            </div>
            <div><label>Shelf Qty</label><input type="number" id="sQ" placeholder="0" oninput="calc()"></div>
        </div>
        <label>Shelf Gauge</label>
        <select id="sGauge" onchange="calc()" style="margin-bottom:12px">
            <option value="24">24 Gauge (0.6mm)</option><option value="22">22 Gauge (0.8mm)</option>
            <option value="20" selected>20 Gauge (1.0mm)</option><option value="18">18 Gauge (1.25mm)</option>
        </select>
        <label>Rate / KG (₹)</label><input type="number" id="rate" placeholder="0" oninput="calc()">
        <div class="dashboard">
            <div class="res-line"><span>Weight:</span> <span class="val" id="w_total">0.00 kg</span></div>
            <div class="res-line"><span>Nut & Bolts:</span> <span class="val" id="nb_total">0 pcs</span></div>
            <div class="res-line"><span>Amt (No GST):</span> <span class="val" id="price_base">₹0</span></div>
            <div class="res-line"><span>GST (18%):</span> <span class="val" id="gst_amt" style="color:#fbbf24">₹0</span></div>
            <div class="price-row"><label style="color:rgba(255,255,255,0.6)">Grand Total</label><span class="grand-total" id="price_grand">₹0</span></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearAll()">Clear</button>
            <button class="btn btn-save" onclick="location.reload()">Refresh App</button>
        </div>
    </div>
</div>
<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    const wMap = {
        '3x12': {24: 1.61, 22: 2.15, 20: 2.69, 18: 3.36}, '3x15': {24: 1.94, 22: 2.59, 20: 3.24, 18: 4.05},
        '3x18': {24: 2.27, 22: 3.03, 20: 3.78, 18: 4.73}, '3x23': {22: 3.9, 20: 4.88, 18: 6.1},
        '4x12': {24: 2.2, 22: 2.93, 20: 3.66, 18: 4.58}, '4x15': {24: 2.64, 22: 3.52, 20: 4.4, 18: 5.51},
        '4x18': {24: 3.09, 22: 4.12, 20: 5.15, 18: 6.44}, '4x23': {22: 5.31, 20: 6.64, 18: 8.3}
    };
    function calc() {
        const h = parseFloat(document.getElementById('aH').value) || 0;
        const aq = parseFloat(document.getElementById('aQ').value) || 0;
        const ag = parseFloat(document.getElementById('aGauge').value) || 0;
        const sq = parseFloat(document.getElementById('sQ').value) || 0;
        const ss = document.getElementById('sSize').value;
        const sg = document.getElementById('sGauge').value;
        const r = parseFloat(document.getElementById('rate').value) || 0;
        let wt = (h * ag * aq) + (wMap[ss][sg] * sq);
        let nb = sq > 0 ? 32 + ((sq - 2) * 8) : 0;
        let base = wt * r; let gst = base * 0.18;
        document.getElementById('w_total').innerText = wt.toFixed(2) + " kg";
        document.getElementById('nb_total').innerText = nb + " pcs";
        document.getElementById('price_base').innerText = "₹" + Math.round(base).toLocaleString('en-IN');
        document.getElementById('gst_amt').innerText = "₹" + Math.round(gst).toLocaleString('en-IN');
        document.getElementById('price_grand').innerText = "₹" + Math.round(base + gst).toLocaleString('en-IN');
    }
    function clearAll() { document.querySelectorAll('input').forEach(i => i.value = ''); calc(); }
</script>
</body>
</html>
