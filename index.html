<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angle Rack Elite</title>
    <style>
        :root { 
            --accent: #059669; 
            --bg: #f1f5f9; 
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px; /* Perfect for mobile width */
            margin-top: 10px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 80px; height: 80px; border-radius: 18px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; margin: 10px 0 0; font-weight: 800; color: #0f172a; }

        .glass-card { 
            background: var(--card);
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        
        label { 
            font-size: 0.65rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #64748b; 
            margin-bottom: 5px; 
            display: block; 
            letter-spacing: 0.5px;
            padding-left: 4px;
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 14px; 
            font-size: 1rem; 
            transition: all 0.2s;
            background: #f8fafc; 
            outline: none; 
            box-sizing: border-box;
            appearance: none; /* Removes default safari styling */
        }

        input:focus { border-color: var(--accent); background: white; }

        .results-box { 
            background: #1e293b; 
            color: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .res-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; opacity: 0.8; }
        .grand-total { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: #34d399; 
            text-align: right; 
            display: block;
            margin-top: 10px;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 15px; border: none; border-radius: 14px; font-weight: 800; font-size: 0.9rem;
            cursor: pointer; transition: transform 0.1s;
        }
        .btn-clear { background: #e2e8f0; color: #64748b; }
        .btn-save { background: var(--accent); color: white; }
        .btn:active { transform: scale(0.96); }

        .history-section { margin-top: 25px; width: 100%; }
        .history-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="manifesticon.png" alt="Logo" onerror="this.style.display='none'">
        <h1>Angle Slotted Rack</h1>
    </div>

    <div class="glass-card">
        <div class="input-grid">
            <div><label>Height (ft)</label><input type="number" id="aH" placeholder="0" oninput="calc()"></div>
            <div><label>Angle Qty</label><input type="number" id="aQ" placeholder="0" oninput="calc()"></div>
        </div>

        <label>Angle Thickness</label>
        <select id="aGauge" onchange="calc()" style="margin-bottom:15px">
            <option value="0.35">14 Gauge (0.35 kg/ft)</option>
            <option value="0.26">16 Gauge (0.26 kg/ft)</option>
            <option value="0.21">18 Gauge (0.21 kg/ft)</option>
        </select>

        <div class="input-grid">
            <div>
                <label>Shelf Size</label>
                <select id="sSize" onchange="calc()">
                    <option value="3x12">3' x 12"</option><option value="3x15">3' x 15"</option>
                    <option value="3x18">3' x 18"</option><option value="3x23">3' x 23"</option>
                    <option value="4x12">4' x 12"</option><option value="4x15">4' x 15"</option>
                    <option value="4x18">4' x 18"</option><option value="4x23">4' x 23"</option>
                </select>
            </div>
            <div><label>Shelf Qty</label><input type="number" id="sQ" placeholder="0" oninput="calc()"></div>
        </div>

        <label>Shelf Gauge</label>
        <select id="sGauge" onchange="calc()" style="margin-bottom:15px">
            <option value="24">24 Gauge (0.6mm)</option>
            <option value="22">22 Gauge (0.8mm)</option>
            <option value="20" selected>20 Gauge (1.0mm)</option>
            <option value="18">18 Gauge (1.25mm)</option>
        </select>

        <label>Rate / KG (₹)</label>
        <input type="number" id="rate" placeholder="0" oninput="calc()">

        <div class="results-box">
            <div class="res-line"><span>Net Weight:</span> <span id="w_total">0.00 kg</span></div>
            <div class="res-line"><span>Nut & Bolts:</span> <span id="nb_total">0 pcs</span></div>
            <div class="res-line"><span>GST (18%):</span> <span id="gst_amt">₹0</span></div>
            <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top:10px; padding-top:10px;">
                <label style="color:rgba(255,255,255,0.5)">Grand Total</label>
                <span class="grand-total" id="price_grand">₹0</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearAll()">Clear</button>
            <button class="btn btn-save" onclick="saveQuote()">Save</button>
        </div>
    </div>

    <div class="history-section" id="history"></div>
</div>

<script>
    const wMap = {
        '3x12': {24: 1.61, 22: 2.15, 20: 2.69, 18: 3.36}, '3x15': {24: 1.94, 22: 2.59, 20: 3.24, 18: 4.05},
        '3x18': {24: 2.27, 22: 3.03, 20: 3.78, 18: 4.73}, '3x23': {22: 3.9, 20: 4.88, 18: 6.1},
        '4x12': {24: 2.2, 22: 2.93, 20: 3.66, 18: 4.58}, '4x15': {24: 2.64, 22: 3.52, 20: 4.4, 18: 5.51},
        '4x18': {24: 3.09, 22: 4.12, 20: 5.15, 18: 6.44}, '4x23': {22: 5.31, 20: 6.64, 18: 8.3}
    };

    function calc() {
        const h = parseFloat(document.getElementById('aH').value) || 0;
        const aq = parseFloat(document.getElementById('aQ').value) || 0;
        const ag = parseFloat(document.getElementById('aGauge').value) || 0;
        const sq = parseFloat(document.getElementById('sQ').value) || 0;
        const ss = document.getElementById('sSize').value;
        const sg = document.getElementById('sGauge').value;
        const r = parseFloat(document.getElementById('rate').value) || 0;

        let wt = (h * ag * aq) + (wMap[ss][sg] * sq);
        let nb = sq > 0 ? 32 + ((sq - 2) * 8) : 0;
        let base = wt * r;
        let gst = base * 0.18;

        document.getElementById('w_total').innerText = wt.toFixed(2) + " kg";
        document.getElementById('nb_total').innerText = nb + " pcs";
        document.getElementById('gst_amt').innerText = "₹" + Math.round(gst).toLocaleString('en-IN');
        document.getElementById('price_grand').innerText = "₹" + Math.round(base + gst).toLocaleString('en-IN');
    }

    function clearAll() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        calc();
    }

    function saveQuote() {
        const total = document.getElementById('price_grand').innerText;
        if(total === "₹0") return;
        let hist = JSON.parse(localStorage.getItem('angleHist')) || [];
        hist.unshift({t: total, d: new Date().toLocaleDateString()});
        localStorage.setItem('angleHist', JSON.stringify(hist));
        renderHist();
    }

    function renderHist() {
        let hist = JSON.parse(localStorage.getItem('angleHist')) || [];
        document.getElementById('history').innerHTML = hist.slice(0,3).map(i => `
            <div class="history-item">
                <span style="font-weight:800; color:var(--accent)">${i.t}</span>
                <span style="font-size:0.7rem; color:#94a3b8">${i.d}</span>
            </div>
        `).join('');
    }
    window.onload = renderHist;
</script>
</body>
</html>
